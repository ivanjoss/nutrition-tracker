<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nutrition &amp; Lifestyle Tracker</title>

  <!-- ── React (UMD, no build step needed) ───────────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- ── Base styles ─────────────────────────────────────────── -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F7F4F0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    input, select, textarea, button { font-family: inherit; }
    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: #F0ECE6; }
    ::-webkit-scrollbar-thumb { background: #C4A882; border-radius: 2px; }
  </style>
</head>
<body>

<div id="root"></div>

<!-- ── localStorage-backed storage shim ────────────────────────
     Matches the window.storage API used throughout the app.
     Keys not found throw (matching the real storage behaviour).  -->
<script>
  window.storage = {
    get:    async (k)    => { const v = localStorage.getItem(k); if (v === null) throw new Error("not found"); return { key: k, value: v }; },
    set:    async (k, v) => { localStorage.setItem(k, v);  return { key: k, value: v }; },
    delete: async (k)    => { localStorage.removeItem(k);  return { key: k, deleted: true }; },
    list:   async (p)    => { const keys = Object.keys(localStorage).filter(k => !p || k.startsWith(p)); return { keys }; },
  };
</script>

<!-- ── Application scripts (order matters) ─────────────────────
     1. data.js       — all static constants, food DB, i18n strings
     2. nutrition.js  — pure calculation functions (getMET, calcBase, …)
     3. ui.js         — shared primitive React components
     4. app.js        — feature components + root App + ReactDOM.createRoot  -->
<script src="data.js"></script>
<script src="nutrition.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
