function calcBase(pr,sc){const{sex,age,weight,height,goal,targetWeight,targetDate}=pr;if(!age||!weight||!height)return null;const w=parseFloat(weight),h=parseFloat(height),a=parseInt(age);const bmr=sex==="male"?88.362+13.397*w+4.799*h-5.677*a:447.593+9.247*w+3.098*h-4.330*a;const wb=Object.values(sc).filter(d=>d.type==="workout").reduce((s,d)=>{const dur=(parseInt(d.dur)||60)/60;return s+(getMET(d.wtype||"Gym / weights",d.inten||"Moderate")*w*dur-bmr*(dur/24))/7;},0);const ab=Object.values(sc).filter(d=>d.type==="active").reduce((s,d)=>s+(d.inten==="Intense"?0.06:d.inten==="Moderate"?0.04:0.015),0);const tdee=Math.round(bmr*(1.2+ab)+wb);const pm=goal==="cut"||goal==="bulk"?1.8:goal==="recomp"?1.6:1.3;const prot=Math.round(w*pm);const tw=targetWeight?parseFloat(targetWeight):null;const td=targetDate?new Date(targetDate):null;const dl=td?Math.max(1,Math.round((td-new Date())/86400000)):null;let cal=tdee;if(tw&&dl&&goal!=="maintain"){const delta=Math.round(((w-tw)*7700)/dl);cal=Math.round(tdee-Math.max(-1000,Math.min(500,delta)));}else if(goal==="cut")cal=Math.round(tdee*0.85);else if(goal==="bulk")cal=Math.round(tdee*1.1);else if(goal==="recomp")cal=Math.round(tdee*0.97);return{bmr:Math.round(bmr),tdee,cal,prot,carbs:Math.round((cal*0.4)/4),fat:Math.round((cal*0.25)/9),water:Math.round(w*35),dl,tw,w};}
function calcDay(base,ds){if(!base)return null;const{type,inten,dur,wtype}=ds;let cal=base.cal,prot=base.prot,carb=base.carbs,fat=base.fat;let water=2200;if(type==="workout"){water=inten==="Intense"?3200:inten==="Moderate"?2800:2500;}else if(type==="active"){water=inten==="Intense"?2800:inten==="Moderate"?2500:2200;}else if(type==="event"){water=2500;}if(type==="workout"){const d=(parseInt(dur)||60)/60;const burn=Math.round(getMET(wtype||"Gym / weights",inten||"Moderate")*base.w*d);cal=base.cal+Math.round(burn*0.6);carb=Math.round(base.carbs*(1+(burn*0.4)/base.cal));prot=Math.round(base.prot*1.05);}else if(type==="active"){const b=inten==="Intense"?0.07:inten==="Moderate"?0.04:0.015;cal=Math.round(base.cal*(1+b));carb=Math.round(base.carbs*(1+b));prot=Math.round(base.prot*1.02);}else if(type==="rest"){cal=Math.round(base.cal*0.9);carb=Math.round(base.carbs*0.75);}return{cal,prot,carb,fat,water,type};}
function dk(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}

function gm(dl){let c=0,p=0,cb=0,f=0;Object.values(dl.meals).forEach(items=>items.forEach(i=>{c+=i.cal||0;p+=i.prot||0;cb+=i.carb||0;f+=i.fat||0;}));return{cal:Math.round(c),prot:Math.round(p),carb:Math.round(cb),fat:Math.round(f)};}

      </div>

}

function WeeklyChart({logs,base,sc,t,F}){
  const[view,setView]=useState("cal");const todayDow=new Date().getDay()===0?6:new Date().getDay()-1;const weekDates=DAYS.map((_,i)=>{const d=new Date();d.setDate(d.getDate()-(todayDow-i));return dk(d);});const DAY_LABS=[t.mon,t.tue,t.wed,t.thu,t.fri,t.sat,t.sun];

  const weekData=DAYS.map((day,i)=>{const dl=logs[weekDates[i]]||ed();const m=gm(dl);const tgt=calcDay(base,sc[day]||{type:"rest"});return{label:DAY_LABS[i],cal:{c:m.cal,t:tgt?.cal||0},prot:{c:m.prot,t:tgt?.prot||0},carb:{c:m.carb,t:tgt?.carb||0},fat:{c:m.fat,t:tgt?.fat||0},water:{c:Math.round(dl.water||0),t:tgt?.water||2200}};});
  const av=VIEWS.find(v=>v.k===view);const consumed=weekData.map(d=>d[view].c);const targets=weekData.map(d=>d[view].t);const allV=[...consumed,...targets].filter(v=>v>0);const maxV=allV.length>0?Math.max(...allV)*1.2:200;
  const W=520,H=150,pL=38,pR=10,pT=12,pB=24;const cW=W-pL-pR,cH=H-pT-pB;const xp=i=>pL+(i/6)*cW;const yp=v=>pT+cH-Math.min(1,v/maxV)*cH;const ticks=[0,Math.round(maxV*0.5),Math.round(maxV)];
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}><SLbl label={t.weeklyTitle} F={F} color={av.color}/><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{VIEWS.map(v=><button key={v.k} onClick={()=>setView(v.k)} style={{padding:"3px 10px",fontSize:F.x,border:`1px solid ${view===v.k?v.color:M.border}`,borderRadius:20,background:view===v.k?v.color:"transparent",color:view===v.k?"#fff":M.muted,cursor:"pointer",fontWeight:view===v.k?500:400}}>{v.label}</button>)}</div></div>
    <div style={{display:"flex",gap:14,fontSize:F.x,color:M.muted,marginBottom:8,flexWrap:"wrap"}}><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:18,height:3,background:av.color,borderRadius:2,display:"inline-block"}}/>{t.consumed}</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:18,height:0,borderTop:`2px dashed ${av.color}`,opacity:0.4,display:"inline-block"}}/>{t.tgt}</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:8,height:8,borderRadius:"50%",background:"#C4786A",display:"inline-block"}}/>{t.over}</span></div>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}}>
      {ticks.map(tick=><g key={tick}><line x1={pL} y1={yp(tick)} x2={W-pR} y2={yp(tick)} stroke={M.border} strokeWidth="1" strokeDasharray="3,3"/><text x={pL-4} y={yp(tick)+4} fontSize="9" fill={M.muted} textAnchor="end">{tick}</text></g>)}
      <polyline points={targets.map((v,i)=>`${xp(i)},${yp(v)}`).join(" ")} fill="none" stroke={av.color} strokeWidth="1.5" strokeDasharray="5,4" opacity="0.4"/>
      <polyline points={consumed.map((v,i)=>`${xp(i)},${yp(v)}`).join(" ")} fill="none" stroke={av.color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {consumed.map((v,i)=><circle key={i} cx={xp(i)} cy={yp(v)} r={4.5} fill={targets[i]>0&&v>targets[i]?"#C4786A":av.color} stroke={M.card} strokeWidth="2"/>)}
      {weekData.map((d,i)=><text key={i} x={xp(i)} y={H-4} fontSize="10" fill={i===todayDow?av.color:M.muted} textAnchor="middle" fontWeight={i===todayDow?700:400}>{d.label}</text>)}
    </svg>
    <div style={{display:"flex",gap:5,marginTop:10}}>{weekData.map((d,i)=>{const v=d[view];const diff=v.c-v.t;const over=v.t>0&&diff>0;return(<div key={i} style={{flex:1,background:i===todayDow?M.light:M.card,border:`1px solid ${i===todayDow?av.color:M.border}`,borderRadius:8,padding:"5px 3px",textAlign:"center"}}><div style={{fontSize:10,color:i===todayDow?av.color:M.muted,fontWeight:i===todayDow?600:400,marginBottom:2}}>{d.label}</div><div style={{fontSize:F.x,fontWeight:500,color:over?"#C4786A":v.c>0?av.color:M.border}}>{v.c||"—"}</div>{v.t>0&&v.c>0&&<div style={{fontSize:10,color:over?"#C4786A":M.sage}}>{over?"+":""}{diff}</div>}</div>);})}</div>
  </div>);}

function Dash({base,logs,wlog,upW,sc,t,F}){
  const[wi,setWi]=useState("");const today=dk(new Date());const tl=logs[today]||ed();const m=gm(tl);const tn=DAYS[new Date().getDay()===0?6:new Date().getDay()-1];const ts=sc[tn]||{type:"rest"};const tgt=calcDay(base,ts);const l30=[];for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);l30.push(dk(d));}const wd=l30.map(k=>({k,w:wlog[k]||null})).filter(d=>d.w);const gw=base?.tw||null;

  return(<div style={{display:"flex",flexDirection:"column",gap:14}}>

    {tgt&&(<Card><SLbl label={t.dgoals} F={F} color={M.clay}/><div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:10,marginBottom:16}}>{[{label:t.calleft,val:Math.max(0,tgt.cal-m.cal),unit:" kcal",sub:`${t.tgt} ${tgt.cal} kcal`,color:M.clay},{label:t.protleft,val:Math.max(0,tgt.prot-m.prot),unit:"g",sub:`${t.tgt} ${tgt.prot}g`,color:M.lavender}].map(({label,val,unit,sub,color})=>(<div key={label} style={{background:M.light,borderRadius:12,padding:"12px 14px",border:`1px solid ${M.border}`}}><div style={{fontSize:F.x,color:M.muted,marginBottom:4}}>{label}</div><div style={{fontSize:F.b+6,fontWeight:600,color}}>{val}<span style={{fontSize:F.x,fontWeight:400,marginLeft:2,color:M.muted}}>{unit}</span></div><div style={{fontSize:F.x,color:M.muted,marginTop:2}}>{sub}</div></div>))}</div><div style={{display:"flex",flexDirection:"column",gap:10}}><MPill label={t.cal} val={m.cal} max={tgt.cal} color={MCOL.cal} unit=" kcal" F={F}/><MPill label={t.prot} val={m.prot} max={tgt.prot} color={MCOL.prot} unit="g" F={F}/><MPill label={t.carb} val={m.carb} max={tgt.carb} color={MCOL.carb} unit="g" F={F}/><MPill label={t.fat} val={m.fat} max={tgt.fat} color={MCOL.fat} unit="g" F={F}/></div></Card>)}
    <Card><SLbl label={t.wtitle} F={F} color={M.mist}/><WeightGraph/><div style={{display:"flex",gap:8,marginTop:14}}><Inp value={wi} onChange={e=>setWi(e.target.value)} placeholder={t.wph} type="number" F={F} style={{flex:1}}/><button onClick={()=>{if(wi){upW(today,wi);setWi("");}}} style={{padding:"10px 18px",fontSize:F.s,border:`1px solid ${M.mist}`,borderRadius:10,background:M.mist,color:"#fff",cursor:"pointer",fontWeight:500,whiteSpace:"nowrap"}}>{t.wlog}</button></div></Card>

  </div>);}

function LFShell({logs,upLog,base,sc,t,F,children}){
  const[selDate,setSelDate]=useState(dk(new Date()));const todayK=dk(new Date());const yestK=dk(new Date(Date.now()-86400000));const dayLog=logs[selDate]||ed();const sidx=new Date(selDate+"T12:00:00").getDay();const sday=DAYS[sidx===0?6:sidx-1];const tgt=calcDay(base,sc[sday]||{type:"rest"});const m=gm(dayLog);const MKEYS=["breakfast","lunch","dinner","snacks"];const MLABS=[t.bfast,t.lunch,t.dinner,t.snacks];
  function prevDay(){const d=new Date(selDate);d.setDate(d.getDate()-1);setSelDate(dk(d));}
  function nextDay(){const d=new Date(selDate);d.setDate(d.getDate()+1);if(dk(d)<=todayK)setSelDate(dk(d));}
  function ddisplay(){if(selDate===todayK)return t.today;if(selDate===yestK)return t.yest;return selDate;}
  function rm(mk,idx){upLog(selDate,day=>({...day,meals:{...day.meals,[mk]:day.meals[mk].filter((_,i)=>i!==idx)}}));}

    {tgt&&<Card style={{padding:"0.75rem 1.25rem"}}><div style={{display:"flex",flexDirection:"column",gap:8}}><MPill label={t.cal} val={m.cal} max={tgt.cal} color={MCOL.cal} unit=" kcal" F={F}/><MPill label={t.prot} val={m.prot} max={tgt.prot} color={MCOL.prot} unit="g" F={F}/><MPill label={t.carb} val={m.carb} max={tgt.carb} color={MCOL.carb} unit="g" F={F}/><MPill label={t.fat} val={m.fat} max={tgt.fat} color={MCOL.fat} unit="g" F={F}/></div></Card>}
    <Card><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><SLbl label={t.wlabel} F={F} color={M.mist}/><span style={{fontSize:F.s,color:M.muted}}>{Math.round(dayLog.water||0)} / {tgt?.water||2200} ml</span></div><MPill label="" val={Math.round(dayLog.water||0)} max={tgt?.water||2200} color={MCOL.water} unit=" ml" F={F}/><div style={{display:"flex",gap:6,marginTop:10}}>{[150,250,350,500].map(ml=><button key={ml} onClick={()=>upLog(selDate,d=>({...d,water:(d.water||0)+ml}))} style={{flex:1,padding:"7px 0",fontSize:F.x,border:`1px solid ${M.border}`,borderRadius:10,background:M.light,color:M.muted,cursor:"pointer",fontWeight:500}}>+{ml}</button>)}</div>{(dayLog.water||0)>0&&<button onClick={()=>upLog(selDate,d=>({...d,water:0}))} style={{marginTop:6,fontSize:F.x,border:"none",background:"none",color:M.dusty,cursor:"pointer",textDecoration:"underline"}}>{t.wreset}</button>}</Card>
    {children(selDate,MKEYS,MLABS)}
    {MKEYS.map((mk,i)=>{const items=dayLog.meals[mk]||[];if(!items.length)return null;const tot=items.reduce((a,x)=>({cal:a.cal+(x.cal||0),prot:a.prot+(x.prot||0)}),{cal:0,prot:0});const mc=[M.clay,M.sage,M.lavender,M.blush][i];return(<Card key={mk}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:4,height:16,borderRadius:2,background:mc}}/><span style={{fontWeight:500,fontSize:F.m,color:M.text}}>{MLABS[i]}</span></div><span style={{fontSize:F.x,color:M.muted,background:M.light,padding:"2px 10px",borderRadius:20,border:`1px solid ${M.border}`}}>{Math.round(tot.cal)} kcal · {Math.round(tot.prot)}g P</span></div>{items.map((item,idx)=>(<div key={idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",borderRadius:8,background:idx%2===0?M.light:M.card,marginBottom:4,fontSize:F.s}}><span style={{flex:1,color:M.text}}>{item.name}</span><span style={{color:M.muted,marginRight:10}}>{Math.round(item.cal||0)} kcal · {Math.round(item.prot||0)}g P</span><button onClick={()=>rm(mk,idx)} style={{border:"none",background:"none",color:M.dusty,cursor:"pointer",fontSize:F.m,padding:0,lineHeight:1}}>×</button></div>))}</Card>);})}
  </div>);}

      {q.length>1&&res.length===0&&!sel&&<p style={{fontSize:F.x,color:M.dusty,marginBottom:10,fontStyle:"italic"}}>{t.nores}</p>}
      {sel&&(<div style={{padding:"14px",background:M.light,borderRadius:12,marginBottom:10,border:`1px solid ${M.border}`}}>

      </div>)}
      <button onClick={()=>setShowM(!showM)} style={{fontSize:F.x,border:"none",background:"none",color:M.dusty,cursor:"pointer",padding:0,marginTop:4,textDecoration:"underline"}}>{showM?"▲ ":"▼ "}{t.manual}</button>
      {showM&&(<div style={{display:"flex",flexDirection:"column",gap:8,padding:"14px",background:M.light,borderRadius:12,marginTop:10,border:`1px solid ${M.border}`}}><Inp value={man.name} onChange={e=>setMan({...man,name:e.target.value})} placeholder={t.fname} F={F}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><Inp value={man.cal} onChange={e=>setMan({...man,cal:e.target.value})} placeholder={t.fcal} type="number" F={F}/><Inp value={man.prot} onChange={e=>setMan({...man,prot:e.target.value})} placeholder={`${t.prot} (g)`} type="number" F={F}/><Inp value={man.carb} onChange={e=>setMan({...man,carb:e.target.value})} placeholder={`${t.carb} (g)`} type="number" F={F}/><Inp value={man.fat} onChange={e=>setMan({...man,fat:e.target.value})} placeholder={`${t.fat} (g)`} type="number" F={F}/></div><button onClick={()=>addMan(selDate)} disabled={!man.name||!man.cal} style={{padding:"9px",fontSize:F.s,fontWeight:500,border:`1px solid ${M.clay}`,borderRadius:10,background:M.clay,color:"#fff",cursor:"pointer"}}>{t.fadd}</button></div>)}
    </Card>)}
  </LFShell>);}

function ScTab({sc,upSc,base,t,F,lang}){
  const DL=[t.mon,t.tue,t.wed,t.thu,t.fri,t.sat,t.sun];const wto=t.wtypes.map((w,i)=>[WT_EN[i],w]);const ito=t.intens.map((v,i)=>[INT_EN[i],v]);const wh=lang==="zh"?WH_ZH:WH_EN;const ah=lang==="zh"?AH_ZH:AH_EN;
  return(<div style={{display:"flex",flexDirection:"column",gap:12}}>{DAYS.map((day,di)=>{const d=sc[day]||{type:"rest"};const tgt=calcDay(base,d);const wt=d.wtype||"Gym / weights";const ii=Math.max(0,INT_EN.indexOf(d.inten||"Moderate"));const wh2=(wh[wt]||wh["Other"])[ii];const ah2=ah[ii];const tagBg=TAG[d.type]?.bg||M.light;const tagTxt=TAG[d.type]?.text||M.muted;
    return(<Card key={day}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><span style={{fontSize:F.m,fontWeight:500,minWidth:44,color:M.text}}>{DL[di]}</span><span style={{padding:"3px 10px",borderRadius:20,fontSize:F.x,fontWeight:500,background:tagBg,color:tagTxt}}>{t.dtypes[d.type||"rest"]}</span><Sel value={d.type||"rest"} onChange={e=>upSc(day,"type",e.target.value)} options={Object.entries(t.dtypes)} F={F} style={{flex:1,maxWidth:160,width:"auto"}}/></div>
    {d.type==="workout"&&<><Divd/><Fld label={t.wtype} F={F}><Sel value={wt} onChange={e=>upSc(day,"wtype",e.target.value)} options={wto} F={F}/></Fld><Fld label={t.dur} F={F}><DurInp value={d.dur||60} onChange={v=>upSc(day,"dur",v)} F={F}/></Fld><Fld label={t.inten} hint={wh2} F={F}><Sel value={d.inten||"Moderate"} onChange={e=>upSc(day,"inten",e.target.value)} options={ito} F={F}/></Fld><Fld label={t.notes} F={F}><Inp value={d.notes||""} onChange={e=>upSc(day,"notes",e.target.value)} placeholder={t.noteph} F={F}/></Fld></>}
    {d.type==="active"&&<><Divd/><Fld label={t.inten} hint={ah2} F={F}><Sel value={d.inten||"Moderate"} onChange={e=>upSc(day,"inten",e.target.value)} options={ito} F={F}/></Fld><Fld label={t.notes} F={F}><Inp value={d.notes||""} onChange={e=>upSc(day,"notes",e.target.value)} placeholder={t.noteph} F={F}/></Fld></>}
    {d.type==="rest"&&<><Divd/><Fld label={t.notes} F={F}><Inp value={d.notes||""} onChange={e=>upSc(day,"notes",e.target.value)} placeholder={t.noteph} F={F}/></Fld></>}
    {d.type==="event"&&<><Divd/><Fld label="Details" F={F}><Inp value={d.detail||""} onChange={e=>upSc(day,"detail",e.target.value)} placeholder={t.evph} F={F}/></Fld><Fld label={t.notes} F={F}><Inp value={d.notes||""} onChange={e=>upSc(day,"notes",e.target.value)} placeholder={t.noteph} F={F}/></Fld></>}
    {tgt&&<><Divd/><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{[{l:t.cal,v:tgt.cal,u:"kcal",c:MCOL.cal},{l:t.prot,v:tgt.prot,u:"g",c:MCOL.prot},{l:t.carb,v:tgt.carb,u:"g",c:MCOL.carb},{l:t.fat,v:tgt.fat,u:"g",c:MCOL.fat}].map(({l,v,u,c})=><div key={l} style={{flex:1,minWidth:60,background:M.light,borderRadius:10,padding:"8px 10px",border:`1px solid ${M.border}`,borderLeft:`3px solid ${c}`}}><div style={{fontSize:F.x,color:M.muted,marginBottom:2}}>{l}</div><div style={{fontSize:F.s,fontWeight:600,color:M.text}}>{v}<span style={{fontSize:F.x,fontWeight:400,marginLeft:1,color:M.muted}}>{u}</span></div></div>)}</div></>}
    </Card>);})}</div>);}

function PrTab({pr,upPr,base,t,F,lang}){
  const flds=[{k:"name",label:t.name,type:"text",ph:"—"},{k:"age",label:t.age,type:"number",ph:"25"},{k:"weight",label:t.wt,type:"number",ph:"70"},{k:"height",label:t.ht,type:"number",ph:"175"},{k:"targetWeight",label:t.twt,type:"number",ph:"68"},{k:"targetDate",label:t.tdate,type:"date",ph:""}];
  return(<div style={{display:"flex",flexDirection:"column",gap:14}}><Card><SLbl label="Personal info" F={F} color={M.warm}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>{flds.map(f=><Fld key={f.k} label={f.label} F={F}><Inp value={pr[f.k]||""} onChange={e=>upPr(f.k,e.target.value)} placeholder={f.ph} type={f.type} F={F}/></Fld>)}<Fld label={t.sex} F={F}><Sel value={pr.sex} onChange={e=>upPr("sex",e.target.value)} options={[["male",t.male],["female",t.female]]} F={F}/></Fld><Fld label={t.goal} F={F}><Sel value={pr.goal} onChange={e=>upPr("goal",e.target.value)} options={[["recomp",t.recomp],["cut",t.cut],["bulk",t.bulk],["maintain",t.maintain]]} F={F}/></Fld></div></Card>
  {base&&(<Card><SLbl label={t.dtargets} F={F} color={M.clay}/>{base.dl&&base.tw&&<div style={{padding:"10px 14px",background:"#EAF0E8",borderRadius:10,fontSize:F.x,color:"#5A7A58",marginBottom:14,lineHeight:1.6,border:"1px solid #C8DBC5"}}>{lang==="zh"?`目標：${base.dl} 天內達到 ${base.tw}kg。`:`Goal: reach ${base.tw}kg in ${base.dl} days.`}</div>}<div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:10,marginBottom:14}}>{[{l:t.bmr,v:base.bmr,u:"kcal",c:M.dusty},{l:t.tdee,v:base.tdee,u:"kcal",c:M.warm},{l:t.cal,v:base.cal,u:"kcal",c:M.clay},{l:t.prot,v:base.prot,u:"g",c:M.lavender},{l:t.carb,v:base.carbs,u:"g",c:M.sage},{l:t.fat,v:base.fat,u:"g",c:M.blush},{l:t.water,v:base.water,u:"ml",c:M.mist}].map(({l,v,u,c})=>(<div key={l} style={{background:M.light,borderRadius:10,padding:"10px 14px",border:`1px solid ${M.border}`}}><div style={{fontSize:F.x,color:M.muted,marginBottom:3}}>{l}</div><div style={{fontSize:F.b+2,fontWeight:600,color:c}}>{v}<span style={{fontSize:F.x,marginLeft:2,fontWeight:400,color:M.muted}}>{u}</span></div></div>))}</div>{[{title:t.bmr,text:t.bmrEx},{title:t.tdee,text:t.tdeeEx}].map(({title,text})=>(<div key={title} style={{borderTop:`1px solid ${M.border}`,paddingTop:12,marginTop:4}}><div style={{fontSize:F.s,fontWeight:500,marginBottom:4,color:M.text}}>{title}</div><div style={{fontSize:F.x,color:M.muted,lineHeight:1.7}}>{text}</div></div>))}</Card>)}</div>);}

function Tips({sc,t,F,lang}){
  const tn=DAYS[new Date().getDay()===0?6:new Date().getDay()-1];const ts=sc[tn]||{type:"rest"};const tt=ts.type==="workout"?"workout":ts.type==="active"?"active":ts.type==="event"?"event":"rest";const tips=lang==="zh"?TIPS_ZH:TIPS_EN;
  return(<div style={{display:"flex",flexDirection:"column",gap:14}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:F.m,fontWeight:500,color:M.text}}>{t.tsched}:</span><span style={{padding:"3px 12px",borderRadius:20,fontSize:F.x,fontWeight:500,background:TAG[ts.type]?.bg||M.light,color:TAG[ts.type]?.text||M.muted}}>{t.dtypes[ts.type]}</span></div>{(tips[tt]||tips.rest).map((tip,i)=>(<Card key={i}><div style={{display:"flex",gap:12,alignItems:"flex-start"}}><div style={{width:8,height:8,borderRadius:"50%",background:[M.sage,M.clay,M.lavender,M.blush][i%4],marginTop:5,flexShrink:0}}/><p style={{fontSize:F.s,lineHeight:1.75,margin:0,color:M.text}}>{tip}</p></div></Card>))}</div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
